<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mercedes F1 Strategy Predictor 2026</title>
<style>
  :root {
    --teal: #00D2BE;
    --red: #E8002D;
    --dark: #1a1a1a;
    --bg: #f5f5f5;
    --card: #ffffff;
    --border: #e0e0e0;
    --text: #1a1a1a;
    --muted: #666666;
    --faint: #999999;
    --green: #0d8a45;
    --amber: #8a5500;
    --blue: #185fa5;
    --danger: #a32d2d;
    --success-bg: rgba(13,138,69,.08);
    --amber-bg: rgba(138,85,0,.08);
    --blue-bg: rgba(24,95,165,.08);
    --danger-bg: rgba(163,45,45,.08);
    --teal-bg: rgba(0,210,190,.08);
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#111;--card:#1e1e1e;--border:#333;
      --text:#f0f0f0;--muted:#999;--faint:#666;
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6}
  .wrap{max-width:780px;margin:0 auto;padding:1.5rem 1rem}
  /* Header */
  .header{display:flex;align-items:center;gap:14px;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
  .logo{width:42px;height:42px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .logo-inner{width:20px;height:20px;border-radius:50%;background:var(--dark)}
  h1{font-size:20px;font-weight:600;color:var(--text)}
  .tagline{font-size:13px;color:var(--muted);margin-top:2px}
  /* Banner */
  .banner{display:flex;align-items:center;gap:8px;padding:.625rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--muted);margin-bottom:1.5rem;flex-wrap:wrap}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite;flex-shrink:0}
  .update-time{margin-left:auto;font-size:12px;color:var(--faint)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  /* Tabs */
  .tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
  .tab{flex:1;padding:9px 12px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;background:transparent;border:none;color:var(--muted);transition:all .15s}
  .tab.active{background:var(--card);color:var(--text);box-shadow:inset 0 0 0 1px var(--border)}
  .tab:hover:not(.active){color:var(--text)}
  /* Card */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
  .card+.card{margin-top:1rem}
  .sec-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.875rem}
  /* Form */
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
  select,input[type=number]{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);outline:none}
  select:focus,input:focus{border-color:var(--teal)}
  .w-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .wbtn{padding:8px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
  .wbtn.active{border-color:var(--teal);background:var(--teal-bg);color:var(--text);font-weight:500}
  .pbtn{width:100%;padding:11px;font-size:14px;font-weight:600;border:1.5px solid var(--teal);border-radius:8px;background:var(--teal-bg);color:var(--text);cursor:pointer;margin-top:8px;transition:all .15s}
  .pbtn:hover{background:rgba(0,210,190,.18)}
  /* Metrics */
  .metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
  .metric{background:var(--bg);border-radius:8px;padding:.875rem 1rem}
  .ml{font-size:11px;color:var(--muted);margin-bottom:3px}
  .mv{font-size:24px;font-weight:700}
  .ms{font-size:11px;color:var(--muted);margin-top:2px}
  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
  .bg{background:var(--success-bg);color:var(--green)}
  .ba{background:var(--amber-bg);color:var(--amber)}
  .br{background:var(--danger-bg);color:var(--danger)}
  .bt{background:var(--teal-bg);color:#0a6b5e}
  .bb{background:var(--blue-bg);color:var(--blue)}
  /* Stint timeline */
  .timeline{display:flex;align-items:flex-start;gap:0;margin:.875rem 0 1.125rem}
  .stint-col{display:flex;flex-direction:column;align-items:center;gap:3px}
  .stint-bar{width:100%;height:28px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff}
  .stint-label{font-size:10px;color:var(--muted)}
  .pit-sep{display:flex;flex-direction:column;align-items:center;padding-top:14px;gap:1px;flex-shrink:0;width:28px}
  .pit-line{width:2px;height:28px;background:var(--red);border-radius:1px;position:relative}
  .pit-dot-mark{width:8px;height:8px;border-radius:50%;background:var(--red);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
  .pit-lap-tag{font-size:9px;color:var(--red);font-weight:600;white-space:nowrap}
  /* Pit stop cards */
  .stop-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:.625rem}
  .stop-card{border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem}
  .sn{font-size:11px;font-weight:600;color:var(--muted)}
  .sl{font-size:24px;font-weight:700;margin:3px 0}
  .sr{font-size:11px;color:var(--muted)}
  /* Strategy bar chart */
  .strat-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .strat-name{font-size:12px;min-width:54px}
  .strat-track{flex:1;height:7px;border-radius:4px;background:var(--bg);overflow:hidden}
  .strat-fill{height:100%;border-radius:4px}
  .strat-pct{font-size:12px;color:var(--muted);min-width:30px;text-align:right}
  /* Calendar */
  .cal-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
  .cal-row:last-child{border:none}
  .cal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .cal-name{flex:1;font-weight:500}
  .cal-result{font-size:12px;color:var(--muted)}
  .cal-date{font-size:12px;color:var(--muted);min-width:68px;text-align:right}
  /* Form table */
  .form-table{width:100%;border-collapse:collapse;font-size:13px}
  .form-table th{text-align:center;padding:5px 4px;font-size:11px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border)}
  .form-table th:first-child{text-align:left}
  .form-table td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--border)}
  .form-table td:first-child{text-align:left;font-weight:500}
  .form-table tr:last-child td{border:none}
  /* Panel visibility */
  .panel{display:none}
  .panel.active{display:block}
  /* Loading */
  .loading{text-align:center;padding:3rem;color:var(--muted)}
  .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Empty */
  .empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
  /* Driver stats */
  .driver-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem}
  .driver-card{border:1px solid var(--border);border-radius:10px;padding:1rem}
  .driver-name{font-size:15px;font-weight:600;margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
  .driver-num{font-size:12px;padding:2px 7px;border-radius:5px;background:var(--teal-bg);color:#0a6b5e;font-weight:700}
  .driver-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ds{background:var(--bg);border-radius:6px;padding:.5rem .75rem}
  .ds-l{font-size:10px;color:var(--muted)}
  .ds-v{font-size:18px;font-weight:700}
  /* Responsive */
  @media(max-width:520px){
    .row2,.metrics,.driver-grid{grid-template-columns:1fr}
    .w-btns{grid-template-columns:1fr 1fr 1fr}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="logo"><div class="logo-inner"></div></div>
    <div>
      <h1>Mercedes F1 Strategy Predictor</h1>
      <div class="tagline">2026 season · Russell &amp; Antonelli · Auto-updates after every race</div>
    </div>
  </div>

  <div class="banner" id="banner">
    <div class="spinner" style="width:14px;height:14px;margin:0;border-width:2px"></div>
    <span>Loading latest race data…</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('predict')">🏁 Predict</button>
    <button class="tab" onclick="switchTab('calendar')">📅 Calendar</button>
    <button class="tab" onclick="switchTab('form')">📊 2026 Form</button>
  </div>

  <!-- Predict panel -->
  <div id="panel-predict" class="panel active">
    <div class="card">
      <div class="sec-label">Race setup</div>
      <div class="row2">
        <div class="field"><label>Grand Prix</label><select id="gp-sel" onchange="clearResult()"><option value="">Select a race…</option></select></div>
        <div class="field"><label>Driver</label>
          <select id="drv-sel" onchange="clearResult()">
            <option value="George Russell">George Russell #63</option>
            <option value="Kimi Antonelli">Kimi Antonelli #12</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div class="field"><label>Starting grid position</label><input type="number" id="grid-pos" min="1" max="22" value="1" oninput="clearResult()" /></div>
        <div class="field"><label>Weather</label>
          <div class="w-btns">
            <div class="wbtn active" onclick="setW(this,'dry')">☀️ Dry</div>
            <div class="wbtn" onclick="setW(this,'mixed')">🌤 Mixed</div>
            <div class="wbtn" onclick="setW(this,'wet')">🌧 Wet</div>
          </div>
        </div>
      </div>
      <button class="pbtn" onclick="predict()">⚡ Generate strategy prediction</button>
    </div>
    <div id="result"></div>
  </div>

  <!-- Calendar panel -->
  <div id="panel-calendar" class="panel">
    <div class="card"><div class="sec-label">2026 Formula 1 Season — 22 Races</div><div id="cal-list"><div class="loading"><div class="spinner"></div>Loading…</div></div></div>
  </div>

  <!-- Form panel -->
  <div id="panel-form" class="panel">
    <div id="driver-stats-wrap"></div>
    <div class="card"><div class="sec-label">2026 Race-by-race results</div><div id="form-table"><div class="loading"><div class="spinner"></div>Loading…</div></div></div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let DATA = null;
let selW = 'dry';
const STINT_COLORS = ['#00D2BE','#1960B0','#059669','#D97706','#7C3AED'];

// ── Data loading ─────────────────────────────────────────────────────────────
async function loadData() {
  try {
    // Try to load the live JSON from the same repo (works when hosted on GitHub Pages)
    const res = await fetch('data/mercedes_strategy.json?_=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    DATA = await res.json();
  } catch(e) {
    // Fallback: use embedded snapshot data (always works, may be slightly older)
    DATA = FALLBACK_DATA;
  }
  onDataLoaded();
}

function onDataLoaded() {
  renderBanner();
  populateGPSelect();
  renderCalendar();
  renderForm();
}

function renderBanner() {
  const m = DATA.meta;
  const nr = m.next_race;
  const updated = new Date(m.last_updated).toLocaleString('en-GB', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  const nrText = nr ? `<strong>Next: R${nr.round} ${nr.name}</strong> · ${fmtDate(nr.date)}` : 'Season complete';
  document.getElementById('banner').innerHTML = `
    <div class="live-dot"></div>
    <span>R${m.current_round}/${m.total_rounds} complete · ${nrText}</span>
    <span class="update-time">Updated ${updated} UTC</span>`;
}

function populateGPSelect() {
  const sel = document.getElementById('gp-sel');
  const cal = DATA.calendar_2026;
  cal.forEach(r => {
    const gpData = DATA.gp_model[r.name];
    if (!gpData) return;
    const opt = document.createElement('option');
    opt.value = r.name;
    const tag = r.status === 'live' ? ' ● LIVE' : r.status === 'done' ? ' ✓' : '';
    opt.textContent = `R${r.round} · ${r.name} (${r.circuit})${tag}`;
    if (r.status === 'live') opt.selected = true;
    sel.appendChild(opt);
  });
  // Pre-select next upcoming if no live race
  if (!sel.value) {
    const next = cal.find(r => r.status === 'upcoming');
    if (next && DATA.gp_model[next.name]) sel.value = next.name;
  }
}

// ── Predict ──────────────────────────────────────────────────────────────────
function predict() {
  if (!DATA) return;
  const gpName = document.getElementById('gp-sel').value;
  const driver = document.getElementById('drv-sel').value;
  const gridPos = Math.max(1, Math.min(22, parseInt(document.getElementById('grid-pos').value) || 1));
  const area = document.getElementById('result');

  if (!gpName) { area.innerHTML = '<div class="empty">Select a race above.</div>'; return; }
  const gpData = DATA.gp_model[gpName];
  if (!gpData) { area.innerHTML = '<div class="empty">No historical data for this circuit yet.</div>'; return; }
  const calRace = DATA.calendar_2026.find(r => r.name === gpName);

  // ── Strategy selection ──
  // Use driver tendency if available, else recent most common, weighted by weather
  let strat = (gpData.driver_tendency && gpData.driver_tendency[driver])
    || gpData.recent_most_common
    || gpData.most_common_strategy
    || '1-stop';

  // Exclude 0-stop (DNF races) from prediction
  if (strat === '0-stop') strat = gpData.most_common_strategy || '1-stop';

  if (selW === 'wet') {
    const n = Math.min(parseInt(strat) + 1, 4); strat = n + '-stop';
  } else if (selW === 'mixed') {
    const n = Math.min(parseInt(strat) + 1, 3); strat = n + '-stop';
  }

  const numStops = parseInt(strat);
  const totalLaps = gpData.total_laps;

  // ── Pit lap calculation ──
  const pitLaps = calcPitLaps(gpData, numStops, totalLaps, gridPos);

  // ── Position gain ──
  const baseGain = gpData.avg_position_gain_by_strategy[strat] ?? 0;
  const gain = baseGain
    + (gridPos >= 10 ? 1.5 : 0)
    + (gridPos >= 15 ? 1.0 : 0)
    + (selW === 'wet' ? 2.0 : 0)
    + (selW === 'mixed' ? 1.0 : 0);
  const predFinish = Math.max(1, Math.min(22, Math.round(gridPos - gain)));

  const dataPoints = gpData.data_points;
  const conf = dataPoints >= 10 ? 'High' : dataPoints >= 5 ? 'Medium' : 'Low';
  const confClass = dataPoints >= 10 ? 'bg' : dataPoints >= 5 ? 'ba' : 'br';
  const wLabel = selW === 'dry' ? '☀️ Dry' : selW === 'mixed' ? '🌤 Mixed' : '🌧 Wet';
  const sprintBadge = calRace?.sprint ? '<span class="badge bb">⚡ Sprint weekend</span>' : '';

  // ── Stint timeline ──
  let timeline = '';
  let prev = 1;
  for (let i = 0; i <= pitLaps.length; i++) {
    const start = prev;
    const end = i < pitLaps.length ? pitLaps[i] : totalLaps;
    const len = end - start + (i === pitLaps.length ? 1 : 0);
    const w = Math.max(6, Math.round((len / totalLaps) * 100));
    const col = STINT_COLORS[i % STINT_COLORS.length];
    const isLast = i === pitLaps.length;
    timeline += `<div class="stint-col" style="flex:${w};min-width:26px">
      <div class="stint-label">S${i+1}</div>
      <div class="stint-bar" style="background:${col}">${len}L</div>
      <div class="stint-label">${start}–${isLast ? totalLaps : end}</div>
    </div>`;
    if (!isLast) {
      timeline += `<div class="pit-sep">
        <div class="pit-line"><div class="pit-dot-mark"></div></div>
        <div class="pit-lap-tag">L${pitLaps[i]}</div>
      </div>`;
    }
    prev = end + 1;
  }

  // ── Pit stop cards ──
  let stopCards = pitLaps.map((lap, i) => {
    const t = gpData.pit_timing[String(i+1)];
    const range = t ? `Historically L${t.min}–${t.max}` : 'Estimated';
    return `<div class="stop-card">
      <div class="sn">Pit stop ${i+1}</div>
      <div class="sl">Lap ${lap}</div>
      <div class="sr">${range}</div>
    </div>`;
  }).join('');

  // ── Strategy distribution bars ──
  let stratBars = Object.entries(gpData.strategy_distribution)
    .filter(([s]) => s !== '0-stop')
    .sort()
    .map(([s, d]) => {
      const sel = s === strat;
      const col = sel ? 'var(--teal)' : '#b4b2a9';
      return `<div class="strat-row">
        <div class="strat-name" style="font-weight:${sel?600:400}">${s}</div>
        <div class="strat-track"><div class="strat-fill" style="width:${d.pct}%;background:${col}"></div></div>
        <div class="strat-pct">${d.pct}%</div>
        ${sel ? '<span class="badge bt">predicted</span>' : '<span style="width:62px"></span>'}
      </div>`;
    }).join('');

  // ── 2026 result at this circuit ──
  let result2026 = '';
  if (gpData.result_2026 && gpData.result_2026.length) {
    const drvResult = gpData.result_2026.find(r => r.driver === driver || r.driver === driver.replace(' ','').toLowerCase());
    if (drvResult) {
      result2026 = `<div style="margin-top:.875rem;padding:.75rem 1rem;background:var(--bg);border-radius:8px;font-size:13px">
        <span style="color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em">2026 result at ${gpName}</span><br>
        <span style="font-size:15px;font-weight:600">${driver} — Grid P${drvResult.grid} → Finished P${drvResult.finish}</span>
        <span style="color:var(--muted);margin-left:8px">${drvResult.strategy||''}</span>
      </div>`;
    }
  }

  const gainStr = gain > 0 ? `+${(gain).toFixed(1)}` : (gain).toFixed(1);
  const gainCol = gain > 0 ? 'var(--green)' : gain < 0 ? 'var(--danger)' : 'var(--text)';

  area.innerHTML = `
  <div class="card" style="margin-top:1rem">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:1rem">
      <div>
        <div style="font-size:16px;font-weight:600">${gpName} GP 2026 ${sprintBadge}</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px">${driver} · Grid P${gridPos} · ${wLabel} · ${fmtDate(calRace?.date||'')}</div>
      </div>
      <span class="badge ${confClass}">📊 ${conf} confidence (${dataPoints} races)</span>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="ml">Predicted strategy</div>
        <div class="mv">${strat}</div>
        <div class="ms">${numStops} pit stop${numStops>1?'s':''} · ${totalLaps} laps</div>
      </div>
      <div class="metric">
        <div class="ml">Expected position gain</div>
        <div class="mv" style="color:${gainCol}">${gainStr}</div>
        <div class="ms">vs grid P${gridPos}</div>
      </div>
      <div class="metric">
        <div class="ml">Predicted finish</div>
        <div class="mv">P${predFinish}</div>
        <div class="ms">From grid P${gridPos}</div>
      </div>
    </div>
    ${result2026}
  </div>
  <div class="card" style="margin-top:1rem">
    <div class="sec-label">Stint timeline</div>
    <div class="timeline">${timeline}</div>
    <div style="border-top:1px solid var(--border);padding-top:1rem">
      <div class="sec-label">Pit stop windows</div>
      <div class="stop-grid">${stopCards || '<p style="color:var(--muted);font-size:13px">No pit stops needed.</p>'}</div>
    </div>
  </div>
  <div class="card" style="margin-top:1rem">
    <div class="sec-label">Historical strategy at ${gpName} (Mercedes, 2018–present)</div>
    <div style="margin-top:.5rem">${stratBars}</div>
    <div style="margin-top:.875rem;font-size:12px;color:var(--muted)">
      ${dataPoints} Mercedes race entries · Latest season data: ${gpData.latest_season}
      ${gpData.driver_tendency?.[driver] ? ` · ${driver.split(' ')[0]}'s recent tendency: ${gpData.driver_tendency[driver]}` : ''}
    </div>
  </div>`;
}

function calcPitLaps(gpData, n, totalLaps, gridPos) {
  const laps = [];
  const gf = gridPos <= 3 ? -2 : gridPos >= 15 ? 2 : 0;
  for (let s = 1; s <= n; s++) {
    const t = gpData.pit_timing[String(s)];
    if (t) {
      let lap = Math.round(t.avg + gf * 0.4);
      lap = Math.max(t.min, Math.min(t.max, lap));
      lap = Math.max(5, Math.min(totalLaps - 5, lap));
      if (laps.length > 0 && lap <= laps[laps.length-1] + 5) {
        lap = laps[laps.length-1] + Math.max(7, Math.round(totalLaps / (n + 1)));
      }
      laps.push(lap);
    } else {
      laps.push(Math.round(totalLaps / (n + 1) * s));
    }
  }
  return laps;
}

// ── Calendar ─────────────────────────────────────────────────────────────────
function renderCalendar() {
  if (!DATA) return;
  const el = document.getElementById('cal-list');
  el.innerHTML = DATA.calendar_2026.map(r => {
    const dotCol = r.status === 'done' ? '#b4b2a9' : r.status === 'live' ? 'var(--red)' : 'var(--teal)';
    const statusBadge = r.status === 'done'
      ? '<span class="badge" style="background:#f0f0f0;color:#666">Done</span>'
      : r.status === 'live'
      ? '<span class="badge br" style="animation:pulse 1.4s infinite">LIVE</span>'
      : '<span class="badge bt">Upcoming</span>';
    const sprint = r.sprint ? '<span style="font-size:10px;color:var(--muted);margin-left:4px">⚡Sprint</span>' : '';
    let results = '';
    if (r.results_2026) {
      const parts = Object.entries(r.results_2026).map(([d,f]) => `${d.split(' ')[1]||d.split(' ')[0]} P${f}`);
      results = `<span class="cal-result">${parts.join(' · ')}</span>`;
    }
    return `<div class="cal-row">
      <div class="cal-dot" style="background:${dotCol}"></div>
      <div class="cal-name">R${r.round} ${r.name}${sprint}</div>
      ${results}
      <div class="cal-date">${fmtDate(r.date)}</div>
      ${statusBadge}
    </div>`;
  }).join('');
}

// ── Form ─────────────────────────────────────────────────────────────────────
function renderForm() {
  if (!DATA) return;

  // Driver stat cards
  const stats = DATA.driver_stats_2026;
  const drivers = Object.entries(stats);
  const driverHTML = `<div class="driver-grid" style="margin-bottom:1rem">${drivers.map(([name, s]) => {
    const num = name.includes('Russell') ? '#63' : '#12';
    return `<div class="driver-card">
      <div class="driver-name">${name}<span class="driver-num">${num}</span></div>
      <div class="driver-stats-grid">
        <div class="ds"><div class="ds-l">Points</div><div class="ds-v" style="color:var(--teal)">${s.points}</div></div>
        <div class="ds"><div class="ds-l">Wins</div><div class="ds-v">${s.wins}</div></div>
        <div class="ds"><div class="ds-l">Podiums</div><div class="ds-v">${s.podiums}</div></div>
        <div class="ds"><div class="ds-l">Avg finish</div><div class="ds-v">P${s.avg_finish}</div></div>
      </div>
    </div>`;
  }).join('')}</div>`;
  document.getElementById('driver-stats-wrap').innerHTML = driverHTML;

  // Race-by-race table
  const doneRaces = DATA.calendar_2026.filter(r => r.status === 'done' && r.results_2026);
  if (!doneRaces.length) {
    document.getElementById('form-table').innerHTML = '<div class="empty">No completed races yet.</div>';
    return;
  }

  const posColor = p => {
    if (p === 'DNF') return 'var(--danger)';
    if (p <= 3) return 'var(--green)';
    if (p <= 6) return 'var(--blue)';
    return 'var(--text)';
  };

  const driverNames = Object.keys(stats);
  const headers = ['Race', ...driverNames.map(d => d.split(' ').pop()), ...driverNames.map(d => d.split(' ').pop() + ' Grid')];

  const rows = doneRaces.map(r => {
    const res = r.results_2026;
    return `<tr>
      <td>R${r.round} ${r.name}</td>
      ${driverNames.map(d => {
        const f = res[d];
        return `<td style="font-weight:600;color:${posColor(f)}">P${f}</td>`;
      }).join('')}
    </tr>`;
  }).join('');

  document.getElementById('form-table').innerHTML = `
    <table class="form-table">
      <thead><tr>
        <th>Race</th>
        ${driverNames.map(d=>`<th style="color:var(--teal)">${d.split(' ').pop()} Finish</th>`).join('')}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="margin-top:1rem;display:flex;gap:16px;font-size:11px;color:var(--muted)">
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--green);margin-right:4px"></span>Podium</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--blue);margin-right:4px"></span>Top 6</span>
      <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--danger);margin-right:4px"></span>DNF</span>
    </div>`;
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['predict','calendar','form'][i] === t));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + t).classList.add('active');
}
function setW(el, w) {
  document.querySelectorAll('.wbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); selW = w;
}
function clearResult() { document.getElementById('result').innerHTML = ''; }
function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
}
