name: Update race data after each Grand Prix

on:
  schedule:
    - cron: "0 22 * * 0"
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "Manual data refresh"

jobs:
  update-data:
    name: Fetch latest F1 data and rebuild model
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run data updater
        run: python scripts/update_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mercedes_strategy.json
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Auto-update: race data refresh ${TIMESTAMP}"
            git push
          fi

      - name: Print summary
        run: |
          echo "File size: $(du -sh data/mercedes_strategy.json | cut -f1)"
          echo "Last updated: $(python -c "import json; d=json.load(open('data/mercedes_strategy.json')); print(d['meta']['last_updated'])")"
