name: Update race data after each Grand Prix

on:
  # ── Scheduled: runs every Sunday at 22:00 UTC (after all Sunday races finish)
  schedule:
    - cron: "0 22 * * 0"

  # ── Also runs on Monday at 06:00 UTC (catches Saturday races like Baku/Las Vegas)
  schedule:
    - cron: "0 6 * * 1"

  # ── Manual trigger (run from GitHub UI anytime)
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "Manual data refresh"

jobs:
  update-data:
    name: Fetch latest F1 data and rebuild model
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated JSON back to the repo

    steps:
      # 1. Check out the repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          pip install requests pyyaml

      # 4. Run the updater
      - name: Run data updater
        run: python scripts/update_data.py

      # 5. Commit and push the updated JSON if it changed
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mercedes_strategy.json
          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Auto-update: race data refresh ${TIMESTAMP}"
            git push
          fi

      # 6. Print a summary
      - name: Print summary
        run: |
          echo "Data file size: $(du -sh data/mercedes_strategy.json | cut -f1)"
          echo "Last updated: $(python -c "import json; d=json.load(open('data/mercedes_strategy.json')); print(d['meta']['last_updated'])")"
          echo "Current round: $(python -c "import json; d=json.load(open('data/mercedes_strategy.json')); print(d['meta']['current_round'])")"
